<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Mochi — Pet Wellness</title>
<meta name="theme-color" content="#F4EAD9" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Mochi" />
<link rel="icon" href="data:," />

<!-- Same CDN pattern as the rest of the LexConv suite — no build step, no npm install. -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  html, body { margin:0; padding:0; background:#F4EAD9; overscroll-behavior:none; }
  * { -webkit-tap-highlight-color: transparent; }

  @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.015); } }
  @keyframes blink { 0%,90%,100% { transform: scaleY(0); } 93% { transform: scaleY(1); } 95% { transform: scaleY(0); } 97% { transform: scaleY(1); } 99% { transform: scaleY(0); } }
  @keyframes wagHappy { from { transform: rotate(-26deg);} to { transform: rotate(26deg);} }
  @keyframes wagSad { from { transform: rotate(-8deg);} to { transform: rotate(4deg);} }
  @keyframes wagAlert { from { transform: rotate(-26deg);} to { transform: rotate(26deg);} }
  @keyframes hop { 0%{transform:translateY(0);} 18%{transform:translateY(-14px);} 36%{transform:translateY(0);} 100%{transform:translateY(0);} }
  @keyframes tilt { 0%,100%{transform:rotate(-6deg);} 50%{transform:rotate(6deg);} }
  @keyframes shiver { from{transform:translateX(-1.5px);} to{transform:translateX(1.5px);} }
  @keyframes glow { 0%,100%{transform:scale(0.94);opacity:0.55;} 50%{transform:scale(1.08);opacity:0.95;} }
  @keyframes squish { 0%{transform:scale(1);} 40%{transform:scale(0.9);} 100%{transform:scale(1);} }

  .pug-breathe { transform-origin: 110px 150px; animation: breathe 2.2s ease-in-out infinite; }
  .pug-eyelid { transform-origin: center; animation: blink 4s ease-in-out infinite; }
  .pug-tail-happy { transform-origin: 168px 150px; animation: wagHappy 0.32s ease-in-out infinite alternate; }
  .pug-tail-sad { transform-origin: 168px 150px; animation: wagSad 0.9s ease-in-out infinite alternate; }
  .pug-tail-alert { transform-origin: 168px 150px; animation: wagAlert 0.22s ease-in-out infinite alternate; }
  .pug-hop { animation: hop 2.2s ease-in-out infinite; }
  .pug-tilt { transform-origin: 110px 92px; animation: tilt 2.4s ease-in-out infinite; }
  .pug-shiver { animation: shiver 0.09s ease-in-out infinite alternate; }
  .pug-glow { animation: glow 2.6s ease-in-out infinite; }
  .pug-squish { animation: squish 0.35s cubic-bezier(0.34,1.56,0.64,1); }

  .bubble-tail { position:absolute; bottom:-7px; left:50%; transform:translateX(-50%) rotate(45deg); width:16px; height:16px; background:rgba(255,255,255,0.75); border-right:1px solid rgba(255,255,255,0.6); border-bottom:1px solid rgba(255,255,255,0.6); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

// ─────────────────────────────────────────────────────────────
// Fill these in with your real values before deploying.
// Same role as config.js in the RN version — nothing else changes.
// ─────────────────────────────────────────────────────────────
const CONFIG = {
  SUPABASE_URL: "https://YOUR-PROJECT-ref.supabase.co",
  SUPABASE_ANON_KEY: "YOUR-SUPABASE-ANON-KEY",
  PAYMENT_LINK_URL: "https://buy.stripe.com/YOUR-PAYMENT-LINK",
};

const MOODS = {
  happy: { glow: "rgba(143,191,159,0.55)", cheek: "#F7B7A3", line: (g) => `${g}, my tummy is full! 🐶` },
  sad:   { glow: "rgba(232,168,124,0.5)",  cheek: "#EBB9AE", line: (g) => `${g}, I don't feel good… time for meds 🥺` },
  alert: { glow: "rgba(232,106,92,0.6)",   cheek: "#F0A090", line: (g) => `${g}! I wandered off the safe zone! 🚨` },
};

function PugMascot({ mood, guardian, message, onPet }) {
  const theme = MOODS[mood] || MOODS.happy;
  const [squish, setSquish] = useState(false);
  const spoken = message || theme.line(guardian);
  const tailClass = mood === "happy" ? "pug-tail-happy" : mood === "sad" ? "pug-tail-sad" : "pug-tail-alert";

  return (
    <div className="flex flex-col items-center">
      <div className="relative mb-3 max-w-[280px] rounded-[26px] bg-white/70 border border-white/60 px-5 py-3 shadow-[0_8px_16px_rgba(138,110,94,0.18)]">
        <p className="text-center text-[15px] font-semibold leading-5 text-[#5B4A3F]">{spoken}</p>
        <div className="bubble-tail"></div>
      </div>

      <button
        onClick={() => { setSquish(true); onPet && onPet(); setTimeout(() => setSquish(false), 350); }}
        className="relative flex items-center justify-center w-[240px] h-[240px] bg-transparent border-0 p-0 cursor-pointer"
      >
        <div className="pug-glow absolute w-[210px] h-[210px] rounded-full" style={{ background: theme.glow }}></div>

        <div className={`${mood === "happy" ? "pug-hop" : ""} ${mood === "alert" ? "pug-shiver" : ""} ${squish ? "pug-squish" : ""}`}>
          <svg width="220" height="220" viewBox="0 0 220 220">
            <defs>
              <radialGradient id="furBody" cx="50%" cy="38%" r="70%">
                <stop offset="0%" stopColor="#F2D6B3" /><stop offset="100%" stopColor="#D9B48A" />
              </radialGradient>
              <radialGradient id="furFace" cx="50%" cy="42%" r="65%">
                <stop offset="0%" stopColor="#F6DFC2" /><stop offset="100%" stopColor="#E4C39A" />
              </radialGradient>
            </defs>

            <ellipse cx="110" cy="205" rx="62" ry="10" fill="rgba(120,95,70,0.16)" />

            <g className={tailClass}>
              <path d="M168 150 q26 -6 22 -28 q14 16 -4 34 q-10 10 -18 -6 z" fill="url(#furBody)" stroke="#C8A377" strokeWidth="1.5" />
            </g>

            <g className="pug-breathe">
              <ellipse cx="110" cy="150" rx="72" ry="88" fill="url(#furBody)" stroke="#C8A377" strokeWidth="1.5" />
              <ellipse cx="110" cy="168" rx="40" ry="46" fill="#F7E4CC" opacity="0.7" />
            </g>

            <ellipse cx="86" cy="206" rx="17" ry="12" fill="#EFD4B0" stroke="#C8A377" strokeWidth="1.2" />
            <ellipse cx="134" cy="206" rx="17" ry="12" fill="#EFD4B0" stroke="#C8A377" strokeWidth="1.2" />

            <g className={mood === "sad" ? "pug-tilt" : ""}>
              <path d="M64 60 q-20 6 -14 40 q18 4 26 -16 z" fill="#7C5C42" />
              <path d="M156 60 q20 6 14 40 q-18 4 -26 -16 z" fill="#7C5C42" />

              <ellipse cx="110" cy="92" rx="64" ry="60" fill="url(#furFace)" stroke="#C8A377" strokeWidth="1.5" />
              <ellipse cx="110" cy="112" rx="34" ry="30" fill="#6E5039" opacity="0.92" />
              <ellipse cx="110" cy="118" rx="26" ry="20" fill="#7C5C42" />
              <path d="M96 60 q14 -8 28 0" stroke="#B3895E" strokeWidth="3" fill="none" strokeLinecap="round" />

              <circle cx="72" cy="104" r="9" fill={theme.cheek} opacity="0.75" />
              <circle cx="148" cy="104" r="9" fill={theme.cheek} opacity="0.75" />

              <ellipse cx="86" cy="88" rx="15" ry="16" fill="#FFFFFF" />
              <ellipse cx="134" cy="88" rx="15" ry="16" fill="#FFFFFF" />
              <circle cx={mood === "sad" ? 88 : 86} cy={mood === "sad" ? 92 : 88} r="8.5" fill="#3A2A20" />
              <circle cx={mood === "sad" ? 132 : 134} cy={mood === "sad" ? 92 : 88} r="8.5" fill="#3A2A20" />
              <circle cx={mood === "sad" ? 85 : 83} cy={mood === "sad" ? 89 : 85} r="3" fill="#FFFFFF" />
              <circle cx={mood === "sad" ? 129 : 131} cy={mood === "sad" ? 89 : 85} r="3" fill="#FFFFFF" />

              <ellipse className="pug-eyelid" cx="86" cy="80" rx="16" ry="11" fill="url(#furFace)" />
              <ellipse className="pug-eyelid" cx="134" cy="80" rx="16" ry="11" fill="url(#furFace)" />

              <ellipse cx="110" cy="106" rx="11" ry="8" fill="#2C2018" />
              <circle cx="106" cy="103" r="2.4" fill="#6B5544" />

              {mood === "happy" && <path d="M96 122 q14 16 28 0" stroke="#2C2018" strokeWidth="3" fill="none" strokeLinecap="round" />}
              {mood === "sad" && (
                <>
                  <path d="M98 128 q12 -10 24 0" stroke="#2C2018" strokeWidth="3" fill="none" strokeLinecap="round" />
                  <path d="M72 100 q-3 8 0 12 q4 -1 3 -6 z" fill="#8FC6E8" opacity="0.9" />
                </>
              )}
              {mood === "alert" && <ellipse cx="110" cy="126" rx="7" ry="9" fill="#2C2018" />}
            </g>

            {mood === "alert" && (
              <g>
                <circle cx="182" cy="34" r="15" fill="#E86A5C" />
                <path d="M182 27 v9" stroke="#fff" strokeWidth="3.5" strokeLinecap="round" />
                <circle cx="182" cy="41" r="2.2" fill="#fff" />
              </g>
            )}
          </svg>
        </div>
      </button>
    </div>
  );
}

function GuardianToggle({ value, onChange }) {
  const isPapa = value === "Papa";
  return (
    <div className="relative flex bg-white/60 border border-white/70 rounded-[20px] p-1 w-[132px]">
      <div className={`absolute top-1 left-1 w-[62px] h-[30px] rounded-2xl bg-[#8FBF9F] transition-transform duration-200 ${isPapa ? "translate-x-[62px]" : "translate-x-0"}`}></div>
      {["Mummy", "Papa"].map((g) => (
        <button key={g} onClick={() => onChange(g)} className="relative z-10 w-[62px] h-[30px] flex items-center justify-center bg-transparent border-0 cursor-pointer">
          <span className={`text-[13px] font-bold ${value === g ? "text-white" : "text-[#8A7867]"}`}>{g}</span>
        </button>
      ))}
    </div>
  );
}

function CardHeader({ icon, title, badge, badgeColor, badgeBg }) {
  return (
    <div className="flex items-center">
      <span className="text-[22px] mr-2.5">{icon}</span>
      <h3 className="text-[18px] font-extrabold text-[#5B4A3F] flex-1">{title}</h3>
      <span className="text-[12px] font-bold rounded-xl px-2.5 py-1" style={{ color: badgeColor, background: badgeBg }}>{badge}</span>
    </div>
  );
}

function GoalRow({ icon, name, current, goal, unit, onAdd }) {
  const pct = Math.min(current / goal, 1) * 100;
  return (
    <div className="mt-4">
      <div className="flex items-center mb-2">
        <span className="text-xl mr-2">{icon}</span>
        <span className="flex-1 font-bold text-[15px] text-[#5B4A3F]">{name}</span>
        <span className="text-[13px] font-semibold text-[#8A7867]">{current}/{goal} {unit}</span>
        <button onClick={onAdd} className="ml-2.5 w-[30px] h-[30px] rounded-full bg-[#5FA47C] text-white text-lg font-bold flex items-center justify-center border-0 cursor-pointer">+</button>
      </div>
      <div className="h-3 rounded-full bg-[#5FA47C]/20 overflow-hidden">
        <div className="h-full rounded-full bg-[#5FA47C] transition-all duration-300" style={{ width: `${pct}%` }}></div>
      </div>
    </div>
  );
}

function MiniMap({ inSafeZone }) {
  return (
    <div className="relative mt-3.5 h-[150px] rounded-[22px] overflow-hidden bg-[#E7EFE9] border border-white/60">
      <svg width="100%" height="150" viewBox="0 0 320 150">
        <path d="M0 40 H320" stroke="#D2DED4" strokeWidth="10" />
        <path d="M0 108 H320" stroke="#D2DED4" strokeWidth="10" />
        <path d="M90 0 V150" stroke="#D2DED4" strokeWidth="10" />
        <path d="M230 0 V150" stroke="#D2DED4" strokeWidth="10" />
        <circle cx="160" cy="75" r="52" fill="rgba(143,191,159,0.22)" stroke="#5FA47C" strokeWidth="2" strokeDasharray="6 6" />
        {inSafeZone ? (
          <>
            <circle cx="160" cy="75" r="12" fill="#5FA47C" opacity="0.25" />
            <circle cx="160" cy="75" r="6" fill="#5FA47C" />
          </>
        ) : (
          <>
            <circle cx="266" cy="126" r="12" fill="#E86A5C" opacity="0.25" />
            <circle cx="266" cy="126" r="6" fill="#E86A5C" />
          </>
        )}
      </svg>
      <div className="absolute bottom-2 left-2.5 bg-white/75 rounded-lg px-2 py-1">
        <span className="text-[11px] font-bold text-[#5B4A3F]">{inSafeZone ? "🏠 Home · 0.0 km away" : "⚠️ 0.6 km from home"}</span>
      </div>
    </div>
  );
}

function MedRow({ name, time, due, onTaken }) {
  return (
    <div className={`mt-3.5 flex items-center rounded-[18px] p-3 ${due ? "bg-[#E86A5C]/15" : "bg-white/40"}`}>
      <div className={`w-10 h-10 rounded-xl flex items-center justify-center mr-3 ${due ? "bg-[#E86A5C]" : "bg-[#8FBF9F]"}`}>
        <span className="text-lg">{due ? "🔔" : "✓"}</span>
      </div>
      <div className="flex-1">
        <p className="font-bold text-sm text-[#5B4A3F]">{name}</p>
        <p className="text-xs text-[#8A7867] mt-0.5">{time}</p>
      </div>
      {due && onTaken && (
        <button onClick={onTaken} className="bg-[#5FA47C] text-white text-[13px] font-bold rounded-2xl px-3.5 py-2 border-0 cursor-pointer">Mark taken</button>
      )}
    </div>
  );
}

function GlassCard({ children, accent, className = "" }) {
  return (
    <div className={`bg-white/55 rounded-[30px] p-5 border-[1.5px] shadow-[0_12px_22px_rgba(138,110,94,0.16)] ${className}`} style={{ borderColor: accent || "rgba(255,255,255,0.7)" }}>
      {children}
    </div>
  );
}

function Dashboard() {
  const [guardian, setGuardian] = useState("Papa");
  const petName = "Mochi";
  const [food, setFood] = useState(1);
  const [water, setWater] = useState(3);
  const FOOD_GOAL = 2, WATER_GOAL = 6;
  const [medDue, setMedDue] = useState(true);
  const [inSafeZone, setInSafeZone] = useState(true);

  const mood = !inSafeZone ? "alert" : medDue ? "sad" : "happy";
  const goalsMet = food >= FOOD_GOAL && water >= WATER_GOAL;
  const pugMessage = mood === "happy" ? (goalsMet ? null : `${guardian}, I still want a little more today… 🍚`) : null;

  return (
    <div className="min-h-screen bg-[#F4EAD9]">
      <div className="max-w-[480px] mx-auto px-[18px] pb-10">
        <div className="flex items-center justify-between pt-6 pb-1">
          <div>
            <p className="text-[13px] font-semibold text-[#8A7867]">Welcome back,</p>
            <h1 className="text-2xl font-extrabold text-[#5B4A3F]">{guardian} 🐾</h1>
          </div>
          <GuardianToggle value={guardian} onChange={setGuardian} />
        </div>

        <div className="flex justify-center mt-2 mb-2.5">
          <PugMascot mood={mood} guardian={guardian} message={pugMessage} onPet={() => {}} />
        </div>

        <GlassCard accent={inSafeZone ? undefined : "rgba(232,106,92,0.5)"} className="mt-1">
          <CardHeader icon="📍" title="Live GPS"
            badge={inSafeZone ? "In safe zone" : "Outside safe zone"}
            badgeColor={inSafeZone ? "#5FA47C" : "#E86A5C"}
            badgeBg={inSafeZone ? "rgba(143,191,159,0.16)" : "rgba(232,106,92,0.14)"} />
          <MiniMap inSafeZone={inSafeZone} />
          <div className="flex gap-2.5 mt-3.5">
            <button className="flex-1 py-3 rounded-2xl bg-[#5FA47C] text-white font-bold text-[15px] border-0 cursor-pointer">View full map</button>
            <button onClick={() => setInSafeZone((v) => !v)}
              className={`flex-1 py-3 rounded-2xl font-bold text-[15px] border-0 cursor-pointer ${inSafeZone ? "bg-[#5B4A3F]/10 text-[#5B4A3F]" : "bg-[#E86A5C] text-white"}`}>
              {inSafeZone ? "Simulate wander" : "Mark as home"}
            </button>
          </div>
        </GlassCard>

        <GlassCard className="mt-4">
          <CardHeader icon="🍚" title="Food & Water"
            badge={goalsMet ? "Goals met" : "In progress"}
            badgeColor={goalsMet ? "#5FA47C" : "#8A7867"}
            badgeBg={goalsMet ? "rgba(143,191,159,0.16)" : "rgba(138,120,103,0.12)"} />
          <GoalRow icon="🍖" name="Food" current={food} goal={FOOD_GOAL} unit="meals" onAdd={() => setFood((v) => Math.min(v + 1, FOOD_GOAL + 2))} />
          <GoalRow icon="💧" name="Water" current={water} goal={WATER_GOAL} unit="cups" onAdd={() => setWater((v) => Math.min(v + 1, WATER_GOAL + 3))} />
        </GlassCard>

        <GlassCard accent={medDue ? "rgba(232,106,92,0.5)" : undefined} className="mt-4">
          <CardHeader icon="💊" title="Medicine Alarms"
            badge={medDue ? "Dose due now" : "All caught up"}
            badgeColor={medDue ? "#E86A5C" : "#5FA47C"}
            badgeBg={medDue ? "rgba(232,106,92,0.14)" : "rgba(143,191,159,0.16)"} />
          <MedRow name="Heartworm chewable" time="8:00 AM" due={medDue} onTaken={() => setMedDue(false)} />
          <MedRow name="Joint supplement" time="7:00 PM" due={false} />
          <button className="w-full mt-3.5 py-3 rounded-2xl bg-[#5B4A3F]/10 text-[#5B4A3F] font-bold text-[15px] border-0 cursor-pointer">＋ Add a medicine reminder</button>
        </GlassCard>

        <a href={CONFIG.PAYMENT_LINK_URL} target="_blank" rel="noopener noreferrer"
          className="block mt-5 rounded-[26px] py-[18px] text-center bg-[#5FA47C] shadow-[0_10px_18px_rgba(95,164,124,0.35)] no-underline">
          <p className="text-white font-extrabold text-base m-0">✨ Unlock {petName}'s Premium Care</p>
          <p className="text-white/85 text-xs mt-0.5 mb-0">Unlimited alerts · vet chat · health history</p>
        </a>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
